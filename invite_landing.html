<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph Tags for Social Previews (WhatsApp, iMessage, etc.) -->
    <meta property="og:title" content="Join me on JC App!" />
    <meta property="og:description" content="Click here to accept my invite and get started." />
    <meta property="og:image" content="https://via.placeholder.com/1200x630.png?text=JC+App+Invite" />
    <!-- Replace with actual image URL -->
    <meta property="og:type" content="website" />

    <title>Join JC App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        p {
            margin-bottom: 2rem;
            color: #666;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            margin-bottom: 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-secondary {
            background-color: #34a853;
            color: white;
        }

        /* Green for Play Store */
        .btn:hover {
            opacity: 0.9;
        }

        .hidden {
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="title">Inviting you...</h1>
        <p id="message">Opening the JC App...</p>
        <div id="loader" class="spinner"></div>

        <!-- Direct Deep Link Button (Hidden by default) -->
        <a id="deepLinkBtn" href="#" class="btn btn-primary hidden">Open in App</a>

        <!-- Store Button (Hidden by default) -->
        <a id="storeBtn" href="#" class="btn btn-secondary hidden">Download on Play Store</a>
    </div>

    <script>
        // 1. Get the invite code from the URL query parameter (e.g., ?code=123)
        const urlParams = new URLSearchParams(window.location.search);
        const inviteCode = urlParams.get('code');

        // Configuration
        const APP_SCHEME = `jcapp://invite.jc/invite/${inviteCode}`;
        const PLAY_STORE_URL = `https://play.google.com/store/apps/details?id=net.joe.jc_first_flutter_app`;
        // The Fallback URL includes the referrer for Deferred Deep Linking
        // Note: We double-encode the referrer value just to be safe, though usage usually requires minimal encoding.
        // Format: referrer=invite_code%3D<CODE>
        const PLAY_STORE_WITH_REFERRER = `${PLAY_STORE_URL}&referrer=invite_code%3D${inviteCode}`;

        if (inviteCode) {
            document.getElementById('title').innerText = `Invitation Code: ${inviteCode}`;

            // Update Buttons
            document.getElementById('deepLinkBtn').href = APP_SCHEME;
            document.getElementById('storeBtn').href = PLAY_STORE_WITH_REFERRER;

            // 2. Attempt Automatic Redirection
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const isAndroid = /Android/i.test(navigator.userAgent);

            if (isMobile) {
                // Try to open the app
                window.location.href = APP_SCHEME;

                // 3. Fallback Logic (Deferred Deep Link)
                // If the user stays on this page (meaning app didn't open), show the Store button
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('message').innerText = "App didn't open? Install it to accept your invite.";

                    if (isAndroid) {
                        // Auto-redirect to Store for Android users is aggressive but effective
                        // Uncomment the next line if you want auto-redirect to store on failure
                        // window.location.href = PLAY_STORE_WITH_REFERRER; 
                        document.getElementById('storeBtn').classList.remove('hidden');
                    } else {
                        // iOS or others
                        document.getElementById('storeBtn').innerText = "Download App (No Deferred Link on iOS)";
                        document.getElementById('storeBtn').href = "https://apps.apple.com/app-placeholder"; // Replace with iOS link
                        document.getElementById('storeBtn').classList.remove('hidden');
                    }

                    // Always show "Try Again" button
                    document.getElementById('deepLinkBtn').classList.remove('hidden');
                    document.getElementById('deepLinkBtn').innerText = "Try Open App Again";

                }, 2500); // Wait 2.5 seconds
            } else {
                // Desktop
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('message').innerText = "Open this link on your mobile device.";
            }
        } else {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('title').innerText = "Welcome to JC App";
            document.getElementById('message').innerText = "Download the app to get started.";
            document.getElementById('storeBtn').href = PLAY_STORE_URL; // Generic Store Link
            document.getElementById('storeBtn').classList.remove('hidden');
        }
    </script>

</body>

</html>
